bio: |
  My research centers on leveraging machine learning and AI to develop improved
  methodologies for future-informed hydrologic assessments, with a specific focus
  on hydrologic extremes such as urban floods. My vision is to support impactful
  adaptation policies by creating reliable, data-driven, and physics-informed models.

